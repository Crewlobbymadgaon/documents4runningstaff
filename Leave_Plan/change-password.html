<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-6 rounded-2xl shadow w-full max-w-sm text-center">

  <h2 class="text-xl font-bold text-blue-700 mb-4">
    Change Password
  </h2>

  <input id="p1" type="password" placeholder="New Password"
    class="w-full p-3 border rounded-xl mb-3">

  <input id="p2" type="password" placeholder="Confirm Password"
    class="w-full p-3 border rounded-xl mb-4">

  <button onclick="changePassword()"
    class="w-full bg-green-600 text-white p-3 rounded-xl">
    Update
  </button>

  <p id="msg" class="text-sm mt-3"></p>

</div>

<script type="module">

import { auth, db } from "./common.js";
import { updatePassword }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { doc, updateDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.changePassword = async ()=>{

  if(p1.value.length<6){
    msg.innerText="Min 6 chars";
    return;
  }

  if(p1.value!==p2.value){
    msg.innerText="Mismatch";
    return;
  }

  try{

    await updatePassword(auth.currentUser,p1.value);

    const id = auth.currentUser.email.split("@")[0];

    await updateDoc(doc(db,"users",id),{
      firstLogin:false
    });

    location.href="apply.html";

  }catch{
    msg.innerText="Error";
  }
};

</script>
</body>
</html>
