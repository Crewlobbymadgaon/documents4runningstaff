<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leave Chart</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui; }

.table-container {
  overflow-x: auto;
  background: white;
}

.sticky-col {
  position: sticky;
  left: 0;
  z-index: 10;
  background: #ffffff;
  min-width: 150px;
  text-align: left;
  padding-left: 10px;
  border-right: 2px solid #e5e7eb;
}

.sticky-header {
  position: sticky;
  top: 0;
  background: #f1f5f9;
  z-index: 5;
}

</style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen p-3">

<!-- HEADER -->
<div class="bg-white rounded-2xl shadow p-4 mb-3 text-center">

  <div class="flex justify-between items-center mb-2">
    <button onclick="location.href='apply.html'" class="text-blue-600 text-sm">⬅ Back</button>
    <button onclick="logout()" class="text-red-500 text-sm">Logout</button>
  </div>

  <div class="text-xl font-bold text-blue-700">Leave Chart</div>
  <div class="text-sm text-gray-600">ALP (MAO)</div>

  <select id="monthSelect"
  class="mt-3 p-2 rounded-xl border shadow text-sm"></select>
</div>

<div class="text-center text-xs text-gray-600 mb-2">
  Tap date to view details
</div>

<div class="table-container bg-white rounded-2xl shadow">
  <table id="table" class="text-xs w-full"></table>
</div>

<!-- POPUP -->
<div id="popup" class="fixed inset-0 bg-black/40 hidden items-center justify-center">
  <div class="bg-white rounded-xl p-4 w-80 max-h-[80vh] overflow-auto">
    <div id="popupTitle" class="font-bold mb-2"></div>
    <div id="popupList" class="text-sm mb-3"></div>

    <button onclick="closePopup()"
      class="w-full bg-gray-500 text-white p-2 rounded">
      Close
    </button>
  </div>
</div>

<script type="module">

import { db } from "./common.js";
import { alpList } from "./alpData.js";

import { collection, getDocs }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let allLeaves = {};
let employees = [];

let today = new Date();
today.setHours(0,0,0,0);

let maxDate = new Date();
maxDate.setDate(today.getDate() + 60);

// LOGOUT
window.logout = ()=>{
  localStorage.removeItem("alpUser");
  location.href="index.html";
};

// LOAD
async function loadData(){

  const snap = await getDocs(collection(db,"leaves"));

  let empMap = {};
  allLeaves = {};

  snap.forEach(d=>{

    let bookings = d.data().bookings || [];

    bookings.sort((a,b)=>a.time-b.time);

    allLeaves[d.id] = bookings;

    bookings.forEach(b=>{
      if(!empMap[b.emp] || b.time < empMap[b.emp]){
        empMap[b.emp] = b.time;
      }
    });
  });

  employees = Object.keys(empMap).sort((a,b)=>empMap[a]-empMap[b]);
}

// MONTH
function buildMonthOptions(){

  let temp = new Date(today.getFullYear(), today.getMonth(), 1);

  while(temp <= maxDate){

    const val = `${temp.getFullYear()}-${String(temp.getMonth()+1).padStart(2,"0")}`;
    const name = temp.toLocaleString("default",{month:"long",year:"numeric"});

    monthSelect.innerHTML += `<option value="${val}">${name}</option>`;

    temp.setMonth(temp.getMonth()+1);
  }
}

// VALID DATES
function getValidDates(year, mon){

  let dates=[];
  let d=new Date(year,mon,1);

  while(d.getMonth()===mon){
    if(d>=today && d<=maxDate) dates.push(new Date(d));
    d.setDate(d.getDate()+1);
  }

  return dates;
}

// RENDER
function renderTable(year, mon){

  const validDates = getValidDates(year, mon);

  table.innerHTML="";

  // HEADER
  let header = `<tr class="sticky-header">`;
  header += `<th class="sticky-col border p-2"></th>`;

  validDates.forEach(d=>{
    header += `<th onclick="showDetails('${d.toISOString()}')" class="border p-2 cursor-pointer">${d.getDate()}</th>`;
  });

  header += `</tr>`;
  table.innerHTML += header;

  // ROWS
  employees.forEach(emp=>{

    const empNo = emp.replace("emp","");
    const user = alpList.find(u=>u.empNo===empNo);

    let row = `<tr>`;

    row += `
      <td class="sticky-col border p-2 font-semibold text-blue-700">
        ${user?.name || emp} <br>
        <span class="text-[10px] text-gray-500">Slot ${user?.slot}</span>
      </td>`;

    validDates.forEach(d=>{

      const ds = d.toISOString().split("T")[0];
      const bookings = allLeaves[ds] || [];

      const b = bookings.find(x=>x.emp===emp);

      let cell = "";

      if(b){
        if(b.status==="approved"){
          cell = "🟢";
        }
        else if(b.status==="pending"){
          cell = "🟡";
        }
        else{
          cell = "⚫";
        }
      }

      row += `<td class="border text-center p-1">${cell}</td>`;
    });

    row += `</tr>`;
    table.innerHTML += row;

  });
}

// POPUP
window.showDetails = (iso)=>{

  const ds = iso.split("T")[0];
  const bookings = allLeaves[ds] || [];

  popup.classList.remove("hidden");
  popup.classList.add("flex");

  popupTitle.innerText = new Date(iso).toDateString();

  let html="";

  bookings.forEach((b,i)=>{

    const empNo = b.emp.replace("emp","");
    const user = alpList.find(u=>u.empNo===empNo);

    html += `
      <div class="flex justify-between border-b py-1">
        <span>${i+1}. ${user?.name}</span>
        <span>${b.status}</span>
      </div>`;
  });

  popupList.innerHTML = html || "No data";
};

window.closePopup = ()=> popup.classList.add("hidden");

// CHANGE
monthSelect.onchange = ()=>{
  const [y,m] = monthSelect.value.split("-");
  renderTable(+y, +m-1);
};

// INIT
await loadData();
buildMonthOptions();
monthSelect.onchange();

</script>
</body>
</html>
