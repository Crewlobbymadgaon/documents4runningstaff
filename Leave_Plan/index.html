<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 to-blue-100 h-screen flex items-center justify-center">

<div class="bg-white p-6 rounded-2xl shadow w-80 text-center">

  <h2 class="text-xl font-bold text-blue-700 mb-4">
    Leave Planning<br>ALP (MAO)
  </h2>

  <input id="empNo" placeholder="Enter Employee No"
    class="w-full p-3 border rounded-xl mb-4 text-center">

  <button onclick="login()"
    class="w-full bg-blue-600 text-white p-3 rounded-xl">
    Continue
  </button>

</div>

<script type="module">

import { auth } from "./common.js";
import { signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

window.login = async ()=>{

  const emp = document.getElementById("empNo").value.trim();

  if(!emp){
    alert("Enter Employee No");
    return;
  }

  const email = "emp" + emp.padStart(3,"0") + "@alp.com";

  try{
    // 🔥 DEFAULT PASSWORD (same for all or predefined)
    await signInWithEmailAndPassword(auth, email, "123456");

    location.href = "home.html";

  }catch(e){
    alert("Invalid Employee No or not registered");
  }
};

</script>
</body>
</html>
