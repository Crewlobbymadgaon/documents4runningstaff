<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apply Leave</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui; }

.nav-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: white;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen p-3">

<!-- HEADER -->
<div class="bg-white rounded-2xl shadow p-4 mb-3">

  <!-- TOP BAR -->
  <div class="flex justify-between items-center mb-2">
    <button onclick="goHome()" class="text-blue-600 text-sm font-semibold">
      ⬅ Back
    </button>

    <button onclick="logoutUser()" class="text-red-500 text-sm font-semibold">
      Logout
    </button>
  </div>

  <!-- TITLE -->
  <div class="text-center">
    <div class="text-xl font-bold text-blue-700">
      Leave Planning
    </div>

    <div id="userInfo" class="text-sm text-gray-700 mt-1"></div>
  </div>

  <!-- VIEW CHART -->
  <button onclick="goChart()"
    class="w-full mt-3 bg-green-600 text-white p-2 rounded-xl text-sm">
    📊 View Leave Chart
  </button>

</div>

<!-- NAV -->
<div class="grid grid-cols-3 items-center mb-3">
  <button onclick="prevMonth()" class="nav-btn">◀</button>
  <div id="monthTitle" class="text-center font-semibold"></div>
  <button onclick="nextMonth()" class="nav-btn">▶</button>
</div>

<!-- CALENDAR -->
<div id="calendar" class="bg-white rounded-xl shadow p-2"></div>

<!-- APPLY -->
<button id="applyBtn"
class="w-full bg-blue-600 text-white p-3 rounded-xl mt-3">
Apply Selected Dates
</button>

<script type="module">

import { auth, db, checkAuth } from "./common.js";
import { alpList } from "./alpData.js";

import {
  doc, getDoc, runTransaction,
  collection, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let currentUser="";
let selectedDates=[];
let usedLeaves=0;
let allLeaves={};
let currentMonthIndex=0;
let months=[];

let today = new Date();
today.setHours(0,0,0,0);

let maxDate = new Date();
maxDate.setDate(today.getDate() + 60);

// 🔐 AUTH
checkAuth(async user=>{

  currentUser = user.email.split("@")[0];

  const empNo = currentUser.replace("emp","");
  const userData = alpList.find(u=>u.empNo===empNo);

  userInfo.innerText = `👤 ${userData?.name} (Slot ${userData?.slot})`;

  await loadUser();
  await loadAllLeaves();

  setupMonths();
  renderCalendar();
});

// 🔙 BACK
window.goHome = ()=>{
  location.href = "index.html";
};

// 🚪 LOGOUT
window.logoutUser = ()=>{
  localStorage.removeItem("alpUser");
  signOut(auth).then(()=>{
    location.href = "index.html";
  });
};

// 📊 VIEW CHART
window.goChart = ()=>{
  location.href = "view.html";
};

// USER
async function loadUser(){
  const snap = await getDoc(doc(db,"users",currentUser));
  usedLeaves = snap.exists()?snap.data().used||0:0;
}

// LEAVES
async function loadAllLeaves(){
  const snap = await getDocs(collection(db,"leaves"));
  allLeaves={};
  snap.forEach(d=>{
    allLeaves[d.id]=d.data().bookings||[];
  });
}

// MONTHS
function setupMonths(){
  months=[];
  let temp = new Date(today.getFullYear(), today.getMonth(), 1);
  while(temp <= maxDate){
    months.push(new Date(temp));
    temp.setMonth(temp.getMonth()+1);
  }
}

// NAV
window.nextMonth=()=>{ if(currentMonthIndex<months.length-1){currentMonthIndex++;renderCalendar();}};
window.prevMonth=()=>{ if(currentMonthIndex>0){currentMonthIndex--;renderCalendar();}};

// CALENDAR
function renderCalendar(){

  const date = months[currentMonthIndex];
  monthTitle.innerText = date.toLocaleString('default',{month:'long',year:'numeric'});

  calendar.innerHTML="";
  const grid=document.createElement("div");
  grid.className="grid grid-cols-7 gap-2 text-center";

  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>{
    const el=document.createElement("div");
    el.className="text-xs font-bold";
    el.innerText=d;
    grid.appendChild(el);
  });

  let d=new Date(date);
  const m=d.getMonth();

  for(let i=0;i<d.getDay();i++) grid.appendChild(document.createElement("div"));

  while(d.getMonth()===m){

    const ds=d.toISOString().split("T")[0];
    const bookings=allLeaves[ds]||[];

    const approvedCount = bookings.filter(b=>b.status==="approved").length;

    const userBooking = bookings.find(b=>b.emp===currentUser);
    const isSelected = selectedDates.includes(ds);

    const box=document.createElement("div");
    box.className="p-2 rounded-xl cursor-pointer text-sm font-semibold";

    const currentDate = new Date(ds);

    // COLORS
    if(currentDate < today || currentDate > maxDate){
      box.classList.add("bg-gray-200","text-gray-400");
    }
    else if(userBooking){

      if(userBooking.status==="approved"){
        box.classList.add("bg-green-600","text-white");
      }
      else if(userBooking.status==="pending"){
        box.classList.add("bg-yellow-400");
      }
      else{
        box.classList.add("bg-gray-400","text-white");
      }

    }
    else if(isSelected){
      box.classList.add("bg-purple-500","text-white");
    }
    else if(approvedCount < 5){
      box.classList.add("bg-green-200");
    }
    else{
      box.classList.add("bg-red-500","text-white");
    }

    let label = approvedCount < 5 ? (5-approvedCount) : "Full";

    box.innerHTML = `
      <div>${d.getDate()}</div>
      <div class="text-[10px]">${label}</div>
    `;

    // CLICK
    box.onclick = async ()=>{

      if(currentDate < today || currentDate > maxDate) return;

      if(userBooking){

        if(userBooking.status==="approved"){
          alert("Approved leave cannot be cancelled");
          return;
        }

        if(!confirm("Cancel leave?")) return;

        await cancelLeave(ds);
        await refresh();
        return;
      }

      if(selectedDates.includes(ds)){
        selectedDates = selectedDates.filter(x=>x!==ds);
      } else {

        if(usedLeaves + selectedDates.length + 1 > 6){
          alert("Max 6 leaves");
          return;
        }

        if(getSlots([...selectedDates, ds]) > 2){
          alert("Max 2 slots");
          return;
        }

        selectedDates.push(ds);
      }

      renderCalendar();
    };

    grid.appendChild(box);
    d.setDate(d.getDate()+1);
  }

  calendar.appendChild(grid);
}

// APPLY
applyBtn.onclick = async ()=>{

  if(selectedDates.length===0){
    alert("Select dates");
    return;
  }

  await runTransaction(db, async (t)=>{

    const userRef = doc(db,"users",currentUser);
    const userSnap = await t.get(userRef);

    let used = userSnap.exists()?userSnap.data().used||0:0;

    for(let date of selectedDates){

      const ref = doc(db,"leaves",date);
      const snap = await t.get(ref);

      let bookings = snap.exists()?snap.data().bookings||[]:[];

      bookings.push({
        emp: currentUser,
        time: Date.now(),
        status: "pending"
      });

      t.set(ref,{bookings});
      used++;
    }

    t.set(userRef,{used});
  });

  alert("Applied");
  selectedDates=[];
  refresh();
};

// CANCEL
async function cancelLeave(date){

  await runTransaction(db, async (t)=>{

    const userRef = doc(db,"users",currentUser);
    const dayRef = doc(db,"leaves",date);

    const userSnap = await t.get(userRef);
    const daySnap = await t.get(dayRef);

    let bookings = daySnap.data().bookings || [];
    bookings = bookings.filter(b=>b.emp!==currentUser);

    let used=userSnap.data().used||0;

    t.set(dayRef,{bookings});
    t.set(userRef,{used:used-1});
  });
}

// REFRESH
async function refresh(){
  await loadUser();
  await loadAllLeaves();
  renderCalendar();
}

// SLOT
function getSlots(dates){
  dates.sort();
  let slots=1;
  for(let i=1;i<dates.length;i++){
    const prev=new Date(dates[i-1]);
    prev.setDate(prev.getDate()+1);
    if(prev.toISOString().split("T")[0]!==dates[i]) slots++;
  }
  return slots;
}

</script>
</body>
</html>
