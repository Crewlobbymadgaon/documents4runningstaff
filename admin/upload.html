<!DOCTYPE html>

<html>
<head>

<title>Upload Document</title>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<header class="bg-blue-900 text-white p-4 text-center font-bold">
Upload Document
</header>

<div class="max-w-lg mx-auto bg-white p-6 mt-6 rounded shadow">

<select id="category" class="border p-2 w-full mb-3">

<option value="shed_order">Shed Order</option>
<option value="safety_circular">Safety Circular</option>
<option value="counselling">Counselling</option>
<option value="correction_slip">Correction Slip</option>

</select>

<select id="lobby" class="border p-2 w-full mb-3">

<option value="">Select Lobby</option>
<option value="mao">Madgaon</option>
<option value="rn">Ratnagiri</option>
<option value="ven">Verna</option>
<option value="sl">Surathkal</option>

</select>

<input id="orderNo"
placeholder="Order No / Circular No"
class="border p-2 w-full mb-3">

<textarea id="description"
placeholder="Description"
class="border p-2 w-full mb-3"></textarea>

<input type="file"
id="file"
class="mb-4">

<button onclick="uploadDoc()"
class="bg-blue-700 text-white w-full py-2 rounded">
Upload </button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";

import { getFirestore,collection,addDoc }
from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

import { getStorage,ref,uploadBytes }
from "https://www.gstatic.com/firebasejs/12.7.0/firebase-storage.js";

const firebaseConfig={
apiKey:"YOUR KEY",
projectId:"doc4runningstaff-d000b",
storageBucket:"doc4runningstaff-d000b.firebasestorage.app"
};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const storage=getStorage(app);

window.uploadDoc=async function(){

const file=fileInput.files[0];

const filePath="documents/"+Date.now()+"_"+file.name;

await uploadBytes(ref(storage,filePath),file);

await addDoc(collection(db,"documents"),{

category:category.value,
lobby:lobby.value,
orderNo:orderNo.value,
description:description.value,
filePath:filePath,
latestRank:1,
uploadedAt:Date.now()

});

alert("Upload Successful");

}

</script>

</body>
</html>
