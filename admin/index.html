<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a8a">
<title>Library Admin</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<header class="bg-blue-900 text-white text-center py-3 font-bold text-lg sticky top-0 z-10">
Running Staff Digital Library — Admin Panel
</header>


<!-- LOGIN -->

<div id="loginBox" class="w-[90%] max-w-sm mx-auto mt-10 bg-white p-6 rounded shadow">

<h2 class="text-lg font-bold mb-4 text-center">Admin Login</h2>

<input id="email" class="border p-2 w-full mb-3 rounded" placeholder="Email">

<input id="password" type="password" class="border p-2 w-full mb-4 rounded" placeholder="Password">

<button onclick="login()" class="w-full bg-blue-700 text-white py-2 rounded">
Login
</button>

</div>


<!-- ADMIN PANEL -->

<div id="adminPanel" class="hidden max-w-6xl mx-auto mt-6">

    <!-- UPLOAD DOCUMENT -->

<!-- UPLOAD BOX -->

<div class="bg-white p-5 rounded shadow mb-6">

<h2 class="font-bold mb-3">Upload Document</h2>

<div class="grid md:grid-cols-2 gap-3">

<select id="category" class="border p-2 rounded" onchange="updateForm()">
<option value="shed_order">Shed Order</option>
<option value="safety_circular">Safety Circular</option>
<option value="counselling">Counselling</option>
<option value="correction_slip">Correction Slip</option>
</select>

<select id="lobby" class="border p-2 rounded">
<option value="">Lobby</option>
<option value="mao">Madgaon</option>
<option value="rn">Ratnagiri</option>
<option value="ven">Verna</option>
<option value="sl">Surathkal</option>
</select>

<select id="section" class="border p-2 rounded hidden">
<option value="gsr">G&SR</option>
<option value="accident">Accident Manual</option>
<option value="wtt_a">WTT Part A</option>
<option value="wtt_b">WTT Part B</option>
</select>

<input id="year" placeholder="Year (2026)" class="border p-2 rounded">

<input id="monthYear"
placeholder="Month-Year (Example: Mar-2026)"
class="border p-2 rounded hidden">

<input id="orderNo" placeholder="Order / Circular / Slip Number" class="border p-2 rounded">

<input id="description" placeholder="Description" class="border p-2 rounded">

<input type="file" id="fileInput" class="border p-2 rounded">

<button onclick="uploadDoc()" class="bg-blue-700 text-white rounded p-2">
Upload
</button>

</div>

</div>


<!-- CATEGORY BUTTONS -->

<div class="flex flex-wrap gap-2 mb-3">

<button onclick="loadDocs('shed_order')" class="bg-blue-700 text-white px-3 py-1 rounded">Shed Orders</button>

<button onclick="loadDocs('safety_circular')" class="bg-blue-700 text-white px-3 py-1 rounded">Safety Circular</button>

<button onclick="loadDocs('counselling')" class="bg-blue-700 text-white px-3 py-1 rounded">Counselling</button>

<button onclick="loadDocs('correction_slip')" class="bg-blue-700 text-white px-3 py-1 rounded">Correction Slip</button>

</div>


<!-- FILTER BAR -->

<div class="flex flex-wrap gap-2 mb-4">

<select id="yearFilter" class="border p-2 rounded hidden">
<option value="">All Years</option>
</select>

<select id="lobbyFilter" class="border p-2 rounded hidden">
<option value="">All Lobby</option>
<option value="mao">Madgaon</option>
<option value="rn">Ratnagiri</option>
<option value="ven">Verna</option>
<option value="sl">Surathkal</option>
</select>

<select id="sectionFilter" class="border p-2 rounded hidden">
<option value="">All Section</option>
<option value="gsr">G&SR</option>
<option value="accident">Accident Manual</option>
<option value="wtt_a">WTT Part A</option>
<option value="wtt_b">WTT Part B</option>
</select>

</div>


<!-- DOCUMENT TABLE -->

<div class="bg-white p-5 rounded shadow">

<h2 class="font-bold mb-3">Manage Documents</h2>

<div class="overflow-x-auto w-full">

<table class="min-w-[700px] w-full text-sm">

<thead class="bg-gray-200">
<tr>
<th class="p-2">Category</th>
<th>Lobby</th>
<th>Section</th>
<th>Title</th>
<th>Date</th>
<th>Latest</th>
<th>Action</th>
</tr>
</thead>

<tbody id="docList"></tbody>

</table>

</div>

</div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
deleteDoc,
doc,
updateDoc,
query,
where
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

import {
getStorage,
ref,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-storage.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";


const firebaseConfig = {

apiKey: "AIzaSyBcnbWtF-BoluQava2x52JENzaOJJhqxVA",
authDomain: "doc4runningstaff-d000b.firebaseapp.com",
projectId: "doc4runningstaff-d000b",
storageBucket: "doc4runningstaff-d000b.firebasestorage.app",
messagingSenderId: "34983733068",
appId: "1:34983733068:web:bbe8a3d902eecaab8bd1e9"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
const storage = getStorage(app);
const auth = getAuth(app);

let currentCategory="";


const categoryNames = {

shed_order:"Shed Order",
safety_circular:"Safety Circular",
counselling:"Counselling",
correction_slip:"Correction Slip"

};


import { addDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
import { uploadBytes } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-storage.js";






window.login = async function(){

try{

await signInWithEmailAndPassword(auth,email.value,password.value);

loginBox.style.display="none";

adminPanel.classList.remove("hidden");

loadDocs('shed_order');

}

catch{

alert("Login failed");

}

};



function getTitle(data){

if(data.category==="shed_order") return data.orderNo;

if(data.category==="safety_circular") return data.circularNo;

if(data.category==="counselling") return data.monthYear;

if(data.category==="correction_slip")
return "CS "+String(data.slipNo).padStart(2,"0");

return "";

}



function renderDocs(list){

let html="";

list.forEach(data=>{

const title=getTitle(data);

const date=data.createdAt
? new Date(data.createdAt).toLocaleString()
: "";

html+=`

<tr>

<td>${categoryNames[data.category]}</td>

<td>${data.lobby || "-"}</td>

<td>${data.section || "-"}</td>

<td>${title}</td>

<td>${date}</td>

<td>${data.latestRank===1?"✔":""}</td>

<td>

<button onclick="viewDoc('${data.filePath}')" class="bg-blue-600 text-white px-2 py-1 rounded">View</button>



<button onclick="setLatest('${data.id}')" class="bg-green-600 text-white px-2 py-1 rounded">Latest</button>

<button onclick="deleteDoc('${data.id}')" class="bg-red-600 text-white px-2 py-1 rounded">Delete</button>

<button onclick="openDoc('${data.id}')" 
class="bg-indigo-600 text-white px-2 py-1 rounded">
Details
</button>
</td>

</tr>

`;

});

docList.innerHTML=html;

}



async function loadDocs(category, fromFilter=false){

currentCategory = category;

/* reset filters only when category changes */

if(!fromFilter){
yearFilter.value="";
lobbyFilter.value="";
sectionFilter.value="";
}

/* hide filters */

yearFilter.classList.add("hidden");
lobbyFilter.classList.add("hidden");
sectionFilter.classList.add("hidden");

/* show needed filters */

if(category==="shed_order"){
yearFilter.classList.remove("hidden");
lobbyFilter.classList.remove("hidden");
}

if(category==="safety_circular"){
yearFilter.classList.remove("hidden");
}

if(category==="counselling"){
yearFilter.classList.remove("hidden");
}

if(category==="correction_slip"){
sectionFilter.classList.remove("hidden");
}


const q = query(
collection(db,"documents"),
where("category","==",category)
);

const snap = await getDocs(q);

const docs=[];
const years = new Set();

snap.forEach(d=>{

const data = d.data();
data.id = d.id;

docs.push(data);

if(data.year){
years.add(String(data.year));
}

});


/* filter */

const filtered = docs.filter(d=>{

if(yearFilter.value && String(d.year)!==yearFilter.value) return false;

if(lobbyFilter.value && d.lobby!==lobbyFilter.value) return false;

if(sectionFilter.value && d.section!==sectionFilter.value) return false;

return true;

});


renderDocs(filtered);


/* build year dropdown */

if(!fromFilter){

yearFilter.innerHTML='<option value="">All Years</option>';

Array.from(years)
.sort((a,b)=>b-a)
.forEach(y=>{
const opt=document.createElement("option");
opt.value=y;
opt.textContent=y;
yearFilter.appendChild(opt);
});

}
}


window.viewDoc = async function(path){

const url=await getDownloadURL(ref(storage,path));

window.open(url);

};



window.deleteDoc = async function(id){

if(!confirm("Delete document?")) return;

await deleteDoc(doc(db,"documents",id));

loadDocs(currentCategory,true);

};



window.setLatest = async function(id){

const snap = await getDocs(collection(db,"documents"));

const targetDoc = snap.docs.find(d => d.id === id);

const targetData = targetDoc.data();

for(const d of snap.docs){

const data = d.data();

let sameGroup=false;

if(targetData.category==="shed_order"){

sameGroup =
data.category==="shed_order" &&
data.lobby===targetData.lobby;

}

else if(targetData.category==="correction_slip"){

sameGroup =
data.category==="correction_slip" &&
data.section===targetData.section;

}

else{

sameGroup = data.category===targetData.category;

}

if(sameGroup){

await updateDoc(doc(db,"documents",d.id),{latestRank:null});

}

}

await updateDoc(doc(db,"documents",id),{latestRank:1});

loadDocs(currentCategory,true);

};


/* filter triggers */

yearFilter.onchange=()=>loadDocs(currentCategory,true);
lobbyFilter.onchange=()=>loadDocs(currentCategory,true);
sectionFilter.onchange=()=>loadDocs(currentCategory,true);


window.loadDocs=loadDocs;


window.editDoc = async function(id){

const newDesc = prompt("Enter new description");

if(newDesc === null) return;

await updateDoc(doc(db,"documents",id),{
description:newDesc
});

alert("Updated successfully");

loadDocs(currentCategory,true);

}

let editingId=null;

window.openDoc = async function(id){

const snap = await getDocs(collection(db,"documents"));

const target = snap.docs.find(d=>d.id===id);

if(!target) return;

const docData = target.data();

editingId=id;

editCategory.value = docData.category || "";
editDescription.value = docData.description || "";
editYear.value = docData.year || "";

docModal.classList.remove("hidden");

}


editBtn.onclick = function(){

editDescription.disabled=false;
editYear.disabled=false;

saveBtn.classList.remove("hidden");

}


saveBtn.onclick = async function(){

await updateDoc(doc(db,"documents",editingId),{

description:editDescription.value,
year:Number(editYear.value)

});

alert("Document updated");

closeModal();

loadDocs(currentCategory,true);

}


window.closeModal = function(){

docModal.classList.add("hidden");

editDescription.disabled=true;
editYear.disabled=true;

saveBtn.classList.add("hidden");

}


window.uploadDoc = async function(){

const file = fileInput.files[0];

if(!file){
alert("Select file");
return;
}

/* STORAGE PATH */

const filePath = "documents/" + category.value + "/" + Date.now() + "_" + file.name;

await uploadBytes(ref(storage,filePath), file);

/* INPUT VALUES */

const yearValue = Number(year.value);
const numberPart = orderNo.value.trim();

/* VARIABLES */

let lobbyValue = null;
let sectionValue = null;

let orderNoValue = null;
let circularNoValue = null;
let monthYearValue = null;

let orderIndexValue = null;
let circularIndexValue = null;

let slipNoValue = null;


/* SHED ORDER */

if(category.value === "shed_order"){

lobbyValue = lobby.value;

orderNoValue = numberPart + "/" + yearValue;

orderIndexValue = Number(yearValue + numberPart.padStart(2,"0"));

}


/* SAFETY CIRCULAR */

if(category.value === "safety_circular"){

circularNoValue = numberPart + "/" + yearValue;

circularIndexValue = Number(yearValue + numberPart.padStart(2,"0"));

}


/* COUNSELLING */

if(category.value === "counselling"){

monthYearValue = monthYear.value;

}


/* CORRECTION SLIP */

if(category.value === "correction_slip"){

sectionValue = section.value;

slipNoValue = Number(numberPart);

}


/* SAVE DOCUMENT */

const newDoc = await addDoc(collection(db,"documents"),{

category: category.value,

lobby: lobbyValue,

section: sectionValue,

orderNo: orderNoValue,

circularNo: circularNoValue,

monthYear: monthYearValue,

slipNo: slipNoValue,

orderIndex: orderIndexValue,

circularIndex: circularIndexValue,

description: description.value,

year: yearValue,

filePath: filePath,

latestRank: null,

createdAt: Date.now()

});


/* ASK ADMIN IF LATEST */

setTimeout(async () => {

const markLatest = confirm("Mark this document as latest?");

if(markLatest){
await setLatest(newDoc.id);
}

},300);


alert("Document Uploaded");


/* RESET FORM */

fileInput.value="";
orderNo.value="";
description.value="";
monthYear.value="";
year.value="";


/* RELOAD TABLE */

loadDocs(category.value,true);

};

window.updateForm = function(){

lobby.classList.add("hidden");
section.classList.add("hidden");
monthYear.classList.add("hidden");
orderNo.classList.remove("hidden");

if(category.value==="shed_order"){
lobby.classList.remove("hidden");
}

if(category.value==="correction_slip"){
section.classList.remove("hidden");
}

if(category.value==="counselling"){
monthYear.classList.remove("hidden");
orderNo.classList.add("hidden");
}

};

</script>
    <script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
<div id="docModal" class="fixed inset-0 bg-black bg-opacity-40 hidden flex items-center justify-center">

<div class="bg-white p-6 rounded shadow w-[95%] max-w-md">

<h2 class="text-lg font-bold mb-3">Document Details</h2>

<label class="text-sm">Category</label>
<input id="editCategory" class="border p-2 w-full mb-2" disabled>

<label class="text-sm">Description</label>
<input id="editDescription" class="border p-2 w-full mb-2" disabled>

<label class="text-sm">Year</label>
<input id="editYear" class="border p-2 w-full mb-2" disabled>

<div class="flex gap-2 mt-3">

<button id="editBtn" class="bg-yellow-500 text-white px-3 py-1 rounded">
Edit
</button>

<button id="saveBtn" class="bg-green-600 text-white px-3 py-1 rounded hidden">
Save
</button>

<button onclick="closeModal()" class="bg-gray-500 text-white px-3 py-1 rounded">
Close
</button>

</div>

</div>

</div>


</body>
</html>
