window.autoSuggestNumber = async function(){

if(category.value==="counselling"){
orderNo.value="";
return;
}

if(category.value==="shed_order" && !lobby.value){
orderNo.value="";
return;
}

if(category.value==="correction_slip" && !section.value){
orderNo.value="";
return;
}

let q;

/* SHED ORDER */

if(category.value==="shed_order"){

q = query(
collection(db,"documents"),
where("category","==","shed_order"),
where("lobby","==",lobby.value),
where("year","==",Number(year.value))
);

}

/* SAFETY CIRCULAR */

if(category.value==="safety_circular"){

q = query(
collection(db,"documents"),
where("category","==","safety_circular"),
where("year","==",Number(year.value))
);

}

/* CORRECTION SLIP */

if(category.value==="correction_slip"){

if(!headingType.value) return;

q = query(
collection(db,"documents"),
where("category","==","correction_slip"),
where("section","==",section.value),
where("headingType","==",headingType.value) // ✅ ADD THIS
);

}

const snap = await getDocs(q);

let max=0;

snap.forEach(d=>{

const data=d.data();

let num=0;

if(data.orderNo){
num=parseInt(data.orderNo.split("/")[0]);
}

if(data.circularNo){
num=parseInt(data.circularNo.split("/")[0]);
}

if(data.slipNo){
num=parseInt(data.slipNo);
}

if(num>max) max=num;

});

orderNo.value = String(max+1).padStart(2,"0");

};

function getTitle(data){

if(data.category==="shed_order") return data.orderNo;

if(data.category==="safety_circular") return data.circularNo;

if(data.category==="counselling") return data.monthYear;

if(data.category==="correction_slip"){

  if(data.headingType === "addendum"){
    return "Addendum No. " + data.slipNo;
  }

  return "CS " + String(data.slipNo).padStart(2,"0");
}

return "";

}



function renderDocs(list){

let html="";

list.forEach(data=>{

const title=getTitle(data);

const date=data.createdAt
? new Date(data.createdAt).toLocaleString()
: "";

html+=`
<tr class="odd:bg-white even:bg-gray-50 hover:bg-blue-50">

<td class="px-4 py-2 whitespace-nowrap font-medium">
${categoryNames[data.category]}
</td>

<td class="px-4 py-2 whitespace-nowrap">
${data.lobby || "-"}
</td>

<td class="px-4 py-2 whitespace-nowrap">
${data.section || "-"}
</td>

<td class="px-4 py-2 whitespace-nowrap text-blue-700">
${title}
</td>

<td class="px-4 py-2 whitespace-nowrap text-gray-600">
${date}
</td>

<td class="px-4 py-2 text-center whitespace-nowrap">
${data.latestRank===1
? '<span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full font-semibold">Latest</span>'
: ''}
</td>

<td class="px-4 py-2 text-center whitespace-nowrap">

<div class="flex justify-center gap-1">

<button onclick="viewDoc('${data.filePath}')"
class="bg-blue-600 hover:bg-blue-700 text-white px-2 py-1 rounded text-xs">
View
</button>

<button onclick="setLatest('${data.id}')"
class="bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded text-xs">
Latest
</button>

<button onclick="deleteDoc('${data.id}')"
class="bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded text-xs">
Delete
</button>

<button onclick="openDoc('${data.id}')"
class="bg-indigo-600 hover:bg-indigo-700 text-white px-2 py-1 rounded text-xs">
Details
</button>

</div>

</td>

</tr>
`;

});

docList.innerHTML=html;

}


async function loadDocs(category, fromFilter=false){


/* highlight selected category button */

document.querySelectorAll(".catBtn").forEach(btn=>{
btn.classList.remove("bg-blue-900");
btn.classList.add("bg-blue-700");
});

if(category==="shed_order") btn_shed.classList.replace("bg-blue-700","bg-blue-900");

if(category==="safety_circular") btn_safety.classList.replace("bg-blue-700","bg-blue-900");

if(category==="counselling") btn_counselling.classList.replace("bg-blue-700","bg-blue-900");

if(category==="correction_slip") btn_correction.classList.replace("bg-blue-700","bg-blue-900");
currentCategory = category;

/* reset filters only when category changes */

if(!fromFilter){
yearFilter.value="";
lobbyFilter.value="";
sectionFilter.value="";
}

/* hide filters */

yearFilter.classList.add("hidden");
lobbyFilter.classList.add("hidden");
sectionFilter.classList.add("hidden");

/* show needed filters */

if(category==="shed_order"){
yearFilter.classList.remove("hidden");
lobbyFilter.classList.remove("hidden");
}

if(category==="safety_circular"){
yearFilter.classList.remove("hidden");
}

if(category==="counselling"){
yearFilter.classList.remove("hidden");
}

if(category==="correction_slip"){
sectionFilter.classList.remove("hidden");
}


const q = query(
collection(db,"documents"),
where("category","==",category)
);

const snap = await getDocs(q);

const docs=[];
const years = new Set();

snap.forEach(d=>{

const data = d.data();
data.id = d.id;

docs.push(data);

if(data.year){
years.add(String(data.year));
}

});

/* sort newest first */

docs.sort((a,b)=>{

/* Shed Orders */

if(category==="shed_order"){
return (b.orderIndex || 0) - (a.orderIndex || 0);
}

/* Safety Circular */

if(category==="safety_circular"){
return (b.circularIndex || 0) - (a.circularIndex || 0);
}

/* Correction Slip */

if(category==="correction_slip"){
return (b.slipNo || 0) - (a.slipNo || 0);
}

/* Counselling */

if(category==="counselling"){

const months = {
jan:1,feb:2,mar:3,apr:4,may:5,jun:6,
jul:7,aug:8,sep:9,oct:10,nov:11,dec:12
};

const [mA,yA] = (a.monthYear || "").toLowerCase().split("-");
const [mB,yB] = (b.monthYear || "").toLowerCase().split("-");

const valA = Number(yA)*100 + (months[mA] || 0);
const valB = Number(yB)*100 + (months[mB] || 0);

return valB - valA;

}

/* fallback */

return (b.createdAt || 0) - (a.createdAt || 0);

});

/* filter */

const filtered = docs.filter(d=>{

if(yearFilter.value && String(d.year)!==yearFilter.value) return false;

if(lobbyFilter.value && d.lobby!==lobbyFilter.value) return false;

if(sectionFilter.value && d.section!==sectionFilter.value) return false;

return true;

});


renderDocs(filtered);


/* build year dropdown */

if(!fromFilter){

yearFilter.innerHTML='<option value="">All Years</option>';

Array.from(years)
.sort((a,b)=>b-a)
.forEach(y=>{
const opt=document.createElement("option");
opt.value=y;
opt.textContent=y;
yearFilter.appendChild(opt);
});

}
}


window.viewDoc = async function(path){

const url=await getDownloadURL(ref(storage,path));

window.open(url);

};



window.deleteDoc = async function(id){

if(!confirm("Delete document?")) return;

await deleteDoc(doc(db,"documents",id));

loadDocs(currentCategory,true);

/* update next number suggestion */
setTimeout(autoSuggestNumber,300);

};



window.setLatest = async function(id){

/* get clicked document */

const targetDoc = await getDoc(doc(db,"documents",id));
if(!targetDoc.exists()) return;

const targetData = targetDoc.data();

/* load documents of same category */

const q = query(
collection(db,"documents"),
where("category","==",targetData.category)
);

const snap = await getDocs(q);

/* reset previous latest */

for(const d of snap.docs){

const data = d.data();

let sameGroup=false;

if(targetData.category==="shed_order"){

sameGroup =
data.category==="shed_order" &&
data.lobby===targetData.lobby;

}

else if(targetData.category==="correction_slip"){

sameGroup =
data.category==="correction_slip" &&
data.section===targetData.section;

}

else{

sameGroup = data.category===targetData.category;

}

if(sameGroup){
await updateDoc(doc(db,"documents",d.id),{latestRank:null});
}

}

/* set new latest */

await updateDoc(doc(db,"documents",id),{latestRank:1});

loadDocs(currentCategory,true);

};



/* filter triggers */

yearFilter.onchange=()=>loadDocs(currentCategory,true);
lobbyFilter.onchange=()=>loadDocs(currentCategory,true);
sectionFilter.onchange=()=>loadDocs(currentCategory,true);


window.loadDocs=loadDocs;

description:newDesc
});

alert("Updated successfully");

}

let editingId=null;

window.openDoc = async function(id){

const targetDoc = await getDoc(doc(db,"documents",id));

if(!targetDoc.exists()) return;

const docData = targetDoc.data();

editingId=id;

editCategory.value = docData.category || "";
editDescription.value = docData.description || "";
editYear.value = docData.year || "";
editTitle.value = getTitle(docData);

docModal.classList.remove("hidden");

}


editBtn.onclick = function(){

editDescription.disabled=false;
editYear.disabled=false;
editTitle.disabled=false;

saveBtn.classList.remove("hidden");

}


saveBtn.onclick = async function(){

const updateData = {
description: editDescription.value,
year: Number(editYear.value)
};

const cat = editCategory.value;

/* update only relevant field */

if(cat === "shed_order"){
updateData.orderNo = editTitle.value;
}

if(cat === "safety_circular"){
updateData.circularNo = editTitle.value;
}

if(cat === "counselling"){
updateData.monthYear = editTitle.value;
}

if(cat === "correction_slip"){
updateData.slipNo = Number(editTitle.value.replace(/\D/g,''));
}

await updateDoc(doc(db,"documents",editingId), updateData);

alert("Document updated");

closeModal();

loadDocs(currentCategory,true);

}


window.closeModal = function(){

docModal.classList.add("hidden");

editDescription.disabled=true;
editYear.disabled=true;

saveBtn.classList.add("hidden");

}


window.uploadDoc = async function(){
    
    

const btn = document.getElementById("uploadActionBtn");

/* VALIDATE REQUIRED FIELDS */

if(!category.value){
alert("Select Category");
return;
}

if(category.value==="shed_order" && !lobby.value){
alert("Select Lobby");
return;
}

if(category.value==="correction_slip" && !section.value){
alert("Select Section");
return;
}

if(category.value==="counselling" && !month.value){
alert("Select Month");
return;
}

if(category.value!=="counselling" && !orderNo.value.trim()){
alert("Enter Order / Circular / Slip Number");
return;
}

if(!description.value.trim()){
alert("Enter Description");
return;
}

if(!year.value){
alert("Select Year");
return;
}

if(!fileInput.files.length){
alert("Select File");
return;
}

btn.innerText = "Uploading...";
btn.disabled = true;
btn.classList.add("opacity-60");

try{

const file = fileInput.files[0];

if(!file){
alert("Select file");
btn.innerText="📤 Upload";
btn.disabled=false;
btn.classList.remove("opacity-60");
return;
}

/* STORAGE PATH */

const filePath = "documents/" + category.value + "/" + Date.now() + "_" + file.name;

await uploadBytes(ref(storage,filePath), file);

/* INPUT VALUES */

let yearValue = Number(year.value);

if(!yearValue){
yearValue = new Date().getFullYear();
}
const numberPart = orderNo.value.trim().padStart(2,"0");

/* VARIABLES */

let lobbyValue = null;
let sectionValue = null;

let orderNoValue = null;
let circularNoValue = null;
let monthYearValue = null;

let orderIndexValue = null;
let circularIndexValue = null;

let slipNoValue = null;


/* SHED ORDER */

if(category.value === "shed_order"){

lobbyValue = lobby.value;

orderNoValue = numberPart + "/" + yearValue;

orderIndexValue = Number(yearValue + numberPart.padStart(2,"0"));

}


/* SAFETY CIRCULAR */

if(category.value === "safety_circular"){

circularNoValue = numberPart + "/" + yearValue;

circularIndexValue = Number(yearValue + numberPart.padStart(2,"0"));

}


/* COUNSELLING */

if(category.value === "counselling"){

monthYearValue = month.value + "-" + yearValue;

}


/* CORRECTION SLIP */

if(category.value === "correction_slip"){

sectionValue = section.value;

slipNoValue = Number(numberPart);

var headingTypeValue = headingType.value; // ✅ ADD THIS

}


/* SAVE DOCUMENT */

const newDoc = await addDoc(collection(db,"documents"),{

category: category.value,
lobby: lobbyValue,
section: sectionValue,
headingType: category.value === "correction_slip" ? headingTypeValue : null,
orderNo: orderNoValue,
circularNo: circularNoValue,
monthYear: monthYearValue,
slipNo: slipNoValue,

orderIndex: orderIndexValue,
circularIndex: circularIndexValue,

description: description.value,

year: yearValue,

filePath: filePath,

latestRank: null,
createdAt: Date.now()

});


/* ASK ADMIN IF LATEST */

openLatestModal(newDoc.id);

/* RESET FORM */

fileInput.value="";
orderNo.value="";
description.value="";

if(category.value==="counselling"){
month.value="";
}

year.value = new Date().getFullYear();

/* RELOAD TABLE */

loadDocs(category.value,true);

/* update next number automatically */
setTimeout(autoSuggestNumber,300);

}
catch(err){

console.error(err);
alert("Upload failed");

}

/* RESTORE BUTTON */

btn.innerText="📤 Upload";
btn.disabled=false;
btn.classList.remove("opacity-60");

};

section.classList.add("hidden");
month.classList.add("hidden");

orderNo.classList.remove("hidden");

if(category.value==="shed_order"){
lobby.classList.remove("hidden");

if(category.value==="correction_slip"){
  section.classList.remove("hidden");
  headingType.classList.remove("hidden");

  // ✅ AUTO DEFAULT
  headingType.value = "cs";
}

if(category.value==="counselling"){
month.classList.remove("hidden");
orderNo.classList.add("hidden");
}

};


window.showMenu = function(menu){

const uploadMenu = document.getElementById("uploadMenu");
const manageMenu = document.getElementById("manageMenu");

let latestDocId = null;

function openLatestModal(id){
latestDocId = id;
document.getElementById("latestModal").classList.remove("hidden");
}

function closeLatestModal(){
document.getElementById("latestModal").classList.add("hidden");
latestDocId = null;
}

document.addEventListener("DOMContentLoaded", () => {

document.getElementById("yesLatestBtn").onclick = async function(){

if(!latestDocId) return;

await window.setLatest(latestDocId);

closeLatestModal();

};

});

document.addEventListener("DOMContentLoaded", () => {

});
